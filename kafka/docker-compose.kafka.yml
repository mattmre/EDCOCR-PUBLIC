# Kafka event bus overlay for EDCOCR
#
# Usage (standalone):
#   docker compose -f kafka/docker-compose.kafka.yml up -d
#
# Usage (with coordinator stack):
#   docker compose -f coordinator/docker-compose.coordinator.yml \
#                  -f kafka/docker-compose.kafka.yml up -d
#
# KRaft mode (no ZooKeeper) — requires Kafka 3.4+

services:
  kafka:
    image: bitnami/kafka:3.7
    hostname: kafka
    container_name: ocr-kafka
    environment:
      # KRaft mode — no ZooKeeper dependency
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      # Listeners
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # Cluster ID (static for reproducible local dev)
      KAFKA_KRAFT_CLUSTER_ID: "ocr-local-kafka-cluster-01"

      # Topic defaults
      KAFKA_CFG_NUM_PARTITIONS: "3"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"

      # Log retention defaults
      KAFKA_CFG_LOG_RETENTION_HOURS: "168"
      KAFKA_CFG_LOG_SEGMENT_BYTES: "1073741824"
      KAFKA_CFG_LOG_RETENTION_CHECK_INTERVAL_MS: "300000"

      # Performance tuning for local dev
      KAFKA_CFG_MESSAGE_MAX_BYTES: "10485760"
      KAFKA_CFG_REPLICA_FETCH_MAX_BYTES: "10485760"

      # Allow auto-create for development convenience
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
      - "${KAFKA_INTERNAL_PORT:-9092}:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  kafka-init:
    image: bitnami/kafka:3.7
    container_name: ocr-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./init-topics.sh:/init-topics.sh:ro
      - ./kafka-topics.yaml:/kafka-topics.yaml:ro
    entrypoint: ["/bin/bash", "/init-topics.sh"]
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: ocr-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: "ocr-local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_METRICS_PORT: "9092"
      SERVER_SERVLET_CONTEXT_PATH: "/"
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kafka_data:
    driver: local

networks:
  default:
    name: ocr-network
    external: false
