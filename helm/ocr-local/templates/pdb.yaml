---
# Celery Beat PDB — singleton; missed beats catch up on restart.
# maxUnavailable: 1 allows eviction during node drain.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-celery-beat-pdb
  labels:
    {{- include "ocr-local.labels" . | nindent 4 }}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "ocr-local.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: celery-beat
