## S3 Canary overlay — adds S3 env vars to coordinator services
## Usage: docker compose -f docker-compose.coordinator.yml -f docker-compose.local-minio.yml -f docker-compose.s3-canary.yml up -d
services:
  django:
    environment:
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-ocr-local}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY to non-default production credential}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?Set S3_SECRET_KEY to non-default production credential}
      S3_REGION: ${S3_REGION:-us-east-1}
    depends_on:
      minio:
        condition: service_healthy

  celery-coordinator:
    environment:
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-ocr-local}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY to non-default production credential}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?Set S3_SECRET_KEY to non-default production credential}
      S3_REGION: ${S3_REGION:-us-east-1}
    depends_on:
      minio:
        condition: service_healthy
