{{- if .Values.layoutCpuWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-layout-cpu-worker
  labels:
    {{- include "ocr-local.labels" . | nindent 4 }}
    app.kubernetes.io/component: layout-cpu-worker
spec:
  {{- if not .Values.layoutCpuWorker.autoscaling.enabled }}
  replicas: {{ .Values.layoutCpuWorker.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ocr-local.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: layout-cpu-worker
  template:
    metadata:
      labels:
        {{- include "ocr-local.labels" . | nindent 8 }}
        app.kubernetes.io/component: layout-cpu-worker
      {{- if .Values.workerSecurity.mTLS.enabled }}
      annotations:
        {{ .Values.workerSecurity.mTLS.annotation }}: {{ .Values.workerSecurity.mTLS.annotationValue | quote }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "ocr-local.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.workerTerminationGracePeriodSeconds | default 360 }}
      {{- with .Values.layoutCpuWorker.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.layoutCpuWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.layoutCpuWorker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: staging-volume
          {{- if eq .Values.workerSecurity.stagingVolume.type "emptyDir" }}
          emptyDir:
            medium: {{ .Values.workerSecurity.stagingVolume.emptyDir.medium }}
            sizeLimit: {{ .Values.workerSecurity.stagingVolume.emptyDir.sizeLimit }}
          {{- else }}
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes: [ "ReadWriteOnce" ]
                storageClassName: {{ .Values.workerSecurity.stagingVolume.pvc.storageClass | quote }}
                resources:
                  requests:
                    storage: {{ .Values.workerSecurity.stagingVolume.pvc.size }}
          {{- end }}
      containers:
        - name: layout-cpu-worker
          image: {{ include "ocr-local.workerImage" . }}
          imagePullPolicy: {{ .Values.image.worker.pullPolicy | default "IfNotPresent" }}
          command:
            - celery
            - -A
            - coordinator.coordinator
            - worker
            - --loglevel=info
            - --queues={{ .Values.layoutCpuWorker.queues }}
            - --concurrency={{ .Values.layoutCpuWorker.concurrency }}
            - --max-tasks-per-child={{ .Values.layoutCpuWorker.maxTasksPerChild }}
            - --hostname=layout-cpu-worker@%h
          volumeMounts:
            - name: staging-volume
              mountPath: {{ .Values.workerSecurity.stagingVolume.mountPath }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secret
          env:
            - name: WORKER_QUEUES
              value: {{ .Values.layoutCpuWorker.queues | quote }}
            - name: WORKER_CONCURRENCY
              value: {{ .Values.layoutCpuWorker.concurrency | quote }}
            - name: WORKER_CAPABILITIES
              value: {{ .Values.layoutCpuWorker.capabilities | quote }}
            {{- range $key, $val := .Values.layoutCpuWorker.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - coordinator.coordinator
                - inspect
                - ping
                - --timeout=10
            periodSeconds: 60
          resources:
            {{- toYaml .Values.layoutCpuWorker.resources | nindent 12 }}
          {{- with .Values.layoutCpuWorker.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
