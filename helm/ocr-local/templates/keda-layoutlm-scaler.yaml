{{- if and .Values.layoutlmWorker.enabled .Values.layoutlmWorker.autoscaling.enabled }}
{{- $strategy := .Values.keda.scalingStrategy | default "balanced" }}
{{- $pollingInterval := .Values.layoutlmWorker.autoscaling.pollingInterval }}
{{- $cooldownPeriod := .Values.layoutlmWorker.autoscaling.cooldownPeriod }}
{{- if eq $strategy "aggressive" }}
{{- $pollingInterval = 10 }}
{{- $cooldownPeriod = 60 }}
{{- else if eq $strategy "conservative" }}
{{- $pollingInterval = 30 }}
{{- $cooldownPeriod = 600 }}
{{- end }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ .Release.Name }}-layoutlm-worker-scaler
  labels:
    {{- include "ocr-local.labels" . | nindent 4 }}
    app.kubernetes.io/component: layoutlm-worker
  annotations:
    ocr-local/scaling-strategy: {{ $strategy }}
    ocr-local/cloud-provider: {{ .Values.cloudProvider | default "generic" }}
spec:
  scaleTargetRef:
    name: {{ .Release.Name }}-layoutlm-worker
  minReplicaCount: {{ .Values.layoutlmWorker.autoscaling.minReplicas }}
  maxReplicaCount: {{ min .Values.layoutlmWorker.autoscaling.maxReplicas (.Values.keda.maxReplicaCount | default 50) }}
  pollingInterval: {{ $pollingInterval }}
  cooldownPeriod: {{ $cooldownPeriod }}
  triggers:
    - type: rabbitmq
      metadata:
        protocol: amqp
        queueName: ocr_layoutlm
        mode: QueueLength
        value: {{ .Values.layoutlmWorker.autoscaling.queueTarget | quote }}
      authenticationRef:
        name: {{ .Release.Name }}-rabbitmq-auth
{{- end }}
