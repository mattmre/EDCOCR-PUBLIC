{{- if and .Values.observability .Values.observability.federation .Values.observability.federation.enabled }}
{{- if eq .Values.observability.federation.mode "remote_write" }}
# =============================================================================
#  -- C3 Federated Observability (remote_write secret stub)
#
# Operators MUST populate this Secret before the Prometheus deployment can
# successfully push samples to the remote endpoints listed in
# `observability.federation.remote_write.endpoints`.
#
# Recommended workflow:
#
#   kubectl edit secret {{ .Release.Name }}-prom-remote-write-auth
#
# and fill in `username` / `password` (and any TLS material) for each named
# remote_write endpoint. The default fields below are intentionally empty so
# that `helm install` succeeds before credentials exist.
#
# Each `endpoint.basic_auth_secret_ref` in values.yaml may either point at
# THIS secret (and use the per-endpoint key prefix) or at a separately
# managed Secret if you prefer to keep credentials per-endpoint.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-prom-remote-write-auth
  labels:
    {{- include "ocr-local.labels" . | nindent 4 }}
    app.kubernetes.io/component: observability-federation
  annotations:
    helm.sh/hook-weight: "0"
    ocr-local.io/note: "populate via kubectl edit before applying remote_write config"
type: Opaque
stringData:
  # Default empty placeholders -- replace via `kubectl edit` per endpoint.
  username: ""
  password: ""
{{- end }}
{{- end }}
