{{- if and .Values.flower.enabled .Values.flower.networkPolicy.enabled }}
# =============================================================================
# NetworkPolicy: Flower monitoring dashboard
#
# Restricts Flower ingress to pods running inside the release namespace.
# Flower exposes Celery task queue internals (job IDs, arguments, timing,
# worker hostnames); basic HTTP auth alone is insufficient for exposure on
# untrusted networks. Production deployments should access Flower through
# `kubectl port-forward`, a VPN, or an authenticated/SSO-enforcing ingress.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-flower-netpol
  labels:
    {{- include "ocr-local.labels" . | nindent 4 }}
    app.kubernetes.io/component: flower
spec:
  podSelector:
    matchLabels:
      {{- include "ocr-local.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: flower
  policyTypes:
    - Ingress
  ingress:
    # Only pods in the same namespace may reach Flower on port 5555.
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5555
{{- end }}
