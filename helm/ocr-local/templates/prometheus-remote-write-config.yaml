{{- if and .Values.observability .Values.observability.federation .Values.observability.federation.enabled }}
{{- if eq .Values.observability.federation.mode "remote_write" }}
# =============================================================================
#  -- C3 Federated Observability (remote_write mode)
#
# This ConfigMap ships a drop-in `additionalScrapeConfigs` / remote_write
# fragment that an external Prometheus operator deployment can consume
# (e.g. via `prometheus.spec.additionalScrapeConfigs` referencing this CM,
# or by mounting the file into a Prometheus pod's config-reloader).
#
# The chart does NOT manage Prometheus itself -- operators are expected to
# run prometheus-operator (or kube-prometheus-stack) and wire this fragment
# in via their own Prometheus CR. See
# docs/operations/plan-c-phase1-c3-federated-observability.md for the
# step-by-step procedure.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-prom-remote-write
  labels:
    {{- include "ocr-local.labels" . | nindent 4 }}
    app.kubernetes.io/component: observability-federation
data:
  remote-write.yaml: |
    # Generated by helm/ocr-local -- do not edit in-cluster.
    # Mount or include in your Prometheus CR's `additionalScrapeConfigs`.
    global:
      external_labels:
        cluster: {{ .Values.observability.federation.cluster_label | quote }}
        {{- if .Values.observability.federation.region_label }}
        region: {{ .Values.observability.federation.region_label | quote }}
        {{- end }}
    remote_write:
    {{- range $endpoint := .Values.observability.federation.remote_write.endpoints }}
      - name: {{ $endpoint.name | quote }}
        url: {{ $endpoint.url | quote }}
        queue_config:
          max_samples_per_send: {{ $.Values.observability.federation.remote_write.queue_config.max_samples_per_send }}
          batch_send_deadline: {{ $.Values.observability.federation.remote_write.queue_config.batch_send_deadline_seconds }}s
          max_shards: {{ $.Values.observability.federation.remote_write.queue_config.max_shards }}
        {{- with $endpoint.headers }}
        headers:
          {{- range $k, $v := . }}
          {{ $k }}: {{ $v | quote }}
          {{- end }}
        {{- end }}
        {{- with $endpoint.basic_auth_secret_ref }}
        basic_auth:
          username:
            name: {{ .name | quote }}
            key: {{ default "username" .username_key | quote }}
          password:
            name: {{ .name | quote }}
            key: {{ default "password" .password_key | quote }}
        {{- end }}
        {{- with $endpoint.tls }}
        tls_config:
          {{- with .ca_secret_ref }}
          ca:
            secret:
              name: {{ .name | quote }}
              key: {{ default "ca.crt" .key | quote }}
          {{- end }}
          insecure_skip_verify: {{ default false .insecure_skip_verify }}
        {{- end }}
    {{- else }}
      []
    {{- end }}
{{- end }}
{{- end }}
