name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-main-image:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/ocr-pipeline
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # amd64 only. The main OCR pipeline image installs
          # paddlepaddle==2.6.2 and paddleocr, which do not publish
          # linux/arm64 manylinux wheels. Production deployment is also
          # GPU-oriented (NVIDIA CUDA), which is amd64-only in practice.
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-coordinator-image:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # QEMU enables cross-platform emulation so the coordinator
      # image can be built for linux/arm64 on the amd64 GitHub runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/coordinator
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./coordinator
          file: ./coordinator/Dockerfile.coordinator
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Multi-architecture build. The coordinator image is
          # pure-Python (Django + Celery client + coordinator/requirements.txt
          # only) with no paddlepaddle, torch, or CUDA dependencies, so it
          # builds cleanly for both linux/amd64 and linux/arm64 (Apple
          # Silicon, AWS Graviton, Raspberry Pi).
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-worker-image:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/ocr-worker
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./coordinator
          file: ./coordinator/Dockerfile.worker
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: SKIP_MODEL_PRELOAD=1
          # amd64 only. The GPU worker image installs the full
          # root requirements.txt (paddlepaddle==2.6.2, paddleocr) which
          # only publishes linux/amd64 wheels. Runtime is also targeted
          # at NVIDIA CUDA GPUs, which are amd64-only in practice.
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-worker-ocr-image:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/ocr-worker-ocr
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./coordinator
          file: ./coordinator/Dockerfile.worker.ocr
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: SKIP_MODEL_PRELOAD=1
          # amd64 only. The OCR-only worker image installs
          # paddlepaddle==2.6.2 and paddleocr from the root requirements.txt.
          # These do not publish linux/arm64 manylinux wheels, and runtime
          # targets NVIDIA CUDA GPUs.
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-worker-nlp-image:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/ocr-worker-nlp
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./coordinator
          file: ./coordinator/Dockerfile.worker.nlp
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: SKIP_MODEL_PRELOAD=1
          # amd64 only. The NLP worker image installs the full root
          # requirements.txt (including paddlepaddle==2.6.2 for NLP fallback
          # paths), which only publishes linux/amd64 wheels.
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-worker-layoutlm-image:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/ocr-worker-layoutlm
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./coordinator
          file: ./coordinator/Dockerfile.worker.layoutlm
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: SKIP_MODEL_PRELOAD=1
          # amd64 only. The LayoutLM worker also installs the root
          # requirements.txt (paddlepaddle==2.6.2) alongside torch, and the
          # default production build targets GPU/CUDA runtime. Keep this
          # image amd64-only for parity with the other worker images.
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
