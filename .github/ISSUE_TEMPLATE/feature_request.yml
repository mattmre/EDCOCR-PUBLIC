name: Feature request
description: Propose a new capability, integration, or enhancement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature.

        Good feature requests start with a **problem**, not a solution. The clearer the problem,
        the more useful the eventual design conversation.

        For open-ended discussions or design ideas, consider using
        [Discussions](https://github.com/mattmre/EDCOCR-PUBLIC/discussions) instead.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the real-world workflow, friction, or gap you are running into. Avoid jumping to an implementation.
      placeholder: |
        "Our team processes 50k mixed-language scans/week. We can detect language per page,
        but we cannot route low-confidence pages to a human reviewer based on the per-span
        language confidence. Today we have to post-process the language sidecar manually."
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution (optional)
      description: If you have an idea, sketch it. If not, leave this blank — describing the problem well is enough.
      placeholder: "Add a confidence threshold to the review queue exception router that triggers on per-span language confidence."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
      description: What workarounds exist today? Why are they insufficient?

  - type: dropdown
    id: scope
    attributes:
      label: Where does this belong?
      description: Pick the closest match — this helps with triage.
      options:
        - OCR pipeline (`ocr_gpu_async.py`)
        - REST API / SDKs
        - Distributed coordinator (Celery / Django)
        - Helm chart / Kubernetes deployment
        - Translation suite
        - Documentation
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Use cases, links to similar features in other tools, performance constraints, anything that helps frame the proposal.
