# OpenTelemetry Collector + Jaeger overlay for EDCOCR
#
# Usage (standalone for local dev):
#   docker compose -f otel/docker-compose.otel.yml up -d
#
# Usage (with coordinator stack):
#   docker compose -f coordinator/docker-compose.coordinator.yml \
#                  -f otel/docker-compose.otel.yml up -d
#
# UI endpoints:
#   Jaeger UI:               http://localhost:16686
#   OTel Collector health:   http://localhost:13133
#   OTel Collector zpages:   http://localhost:55679
#   Prometheus metrics:      http://localhost:8889/metrics

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command:
      - "--config=/etc/otel-collector-config.yaml"
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
      - "8889:8889"    # Prometheus exporter metrics
      - "13133:13133"  # Health check extension
      - "55679:55679"  # zpages extension
    environment:
      OTEL_ENVIRONMENT: ${OTEL_ENVIRONMENT:-development}
      OTEL_MEMORY_LIMIT_MIB: ${OTEL_MEMORY_LIMIT_MIB:-512}
      OTEL_MEMORY_SPIKE_MIB: ${OTEL_MEMORY_SPIKE_MIB:-128}
      OTEL_BATCH_TIMEOUT: ${OTEL_BATCH_TIMEOUT:-5s}
      OTEL_BATCH_SIZE: ${OTEL_BATCH_SIZE:-512}
      OTEL_JAEGER_ENDPOINT: ${OTEL_JAEGER_ENDPOINT:-jaeger:4317}
    depends_on:
      jaeger:
        condition: service_started
    networks:
      - ocr_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.54
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger HTTP collector (legacy)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - ocr_network
    restart: unless-stopped

networks:
  ocr_network:
    external: true
    name: coordinator_default
