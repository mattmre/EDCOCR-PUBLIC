name: Publish SDKs

on:
  push:
    tags:
      - 'sdk-python-v*'
      - 'sdk-ts-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.1) — optional, for testing only'
        required: false
        type: string

permissions:
  contents: read

jobs:
  version-check:
    name: Version Consistency Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Check version consistency
        run: python scripts/check_version_consistency.py

  # Python SDK publishing (triggered by sdk-python-v* tags)
  build-python:
    name: Build Python SDK
    needs: version-check
    if: startsWith(github.ref, 'refs/tags/sdk-python-v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install hatchling build

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio respx httpx pydantic

      - name: Run SDK tests
        run: pytest tests/test_python_sdk_package.py -q

      - name: Build package
        working-directory: sdk/python
        run: python -m build

      - name: Validate package metadata
        run: |
          pip install twine
          twine check sdk/python/dist/*

      - name: Test install from wheel
        run: |
          pip install sdk/python/dist/*.whl
          python -c "from edcocr_sdk import EDCOCRClient; print('SDK import OK')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sdk-dist
          path: sdk/python/dist/

  publish-python:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: build-python
    if: startsWith(github.ref, 'refs/tags/sdk-python-v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: sdk-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}

  # TypeScript SDK publishing (triggered by sdk-ts-v* tags)
  build-and-test-typescript:
    name: Build and Test TypeScript SDK
    needs: version-check
    if: startsWith(github.ref, 'refs/tags/sdk-ts-v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: sdk/typescript
        run: npm ci

      - name: Type check
        working-directory: sdk/typescript
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: sdk/typescript
        run: npm test

      - name: Build
        working-directory: sdk/typescript
        run: npm run build

      - name: Dry-run npm pack
        working-directory: sdk/typescript
        run: npm pack --dry-run

      - name: Verify dist output
        working-directory: sdk/typescript
        run: |
          test -f dist/index.js || (echo "dist/index.js not found" && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts not found" && exit 1)
          echo "All expected dist files present."

  publish-typescript:
    name: Publish TypeScript SDK to npm
    runs-on: ubuntu-latest
    needs: build-and-test-typescript
    if: startsWith(github.ref, 'refs/tags/sdk-ts-v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: sdk/typescript
        run: npm ci

      - name: Build
        working-directory: sdk/typescript
        run: npm run build

      - name: Publish to npm
        working-directory: sdk/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            npm publish --access public --provenance
          else
            echo "NPM_TOKEN secret not set, skipping publish"
          fi
