{{- if .Values.layoutlmWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-layoutlm-worker
  labels:
    {{- include "ocr-local.labels" . | nindent 4 }}
    app.kubernetes.io/component: layoutlm-worker
spec:
  {{- if not .Values.layoutlmWorker.autoscaling.enabled }}
  replicas: {{ .Values.layoutlmWorker.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ocr-local.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: layoutlm-worker
  template:
    metadata:
      labels:
        {{- include "ocr-local.labels" . | nindent 8 }}
        app.kubernetes.io/component: layoutlm-worker
      {{- if .Values.workerSecurity.mTLS.enabled }}
      annotations:
        {{ .Values.workerSecurity.mTLS.annotation }}: {{ .Values.workerSecurity.mTLS.annotationValue | quote }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "ocr-local.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.workerTerminationGracePeriodSeconds | default 360 }}
      {{- with .Values.layoutlmWorker.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.layoutlmWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.layoutlmWorker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- if .Values.layoutlmWorker.gpu.enabled }}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.layoutlmWorker.shmSize | default "4Gi" }}
        {{- end }}
        - name: staging-volume
          {{- if eq .Values.workerSecurity.stagingVolume.type "emptyDir" }}
          emptyDir:
            medium: {{ .Values.workerSecurity.stagingVolume.emptyDir.medium }}
            sizeLimit: {{ .Values.workerSecurity.stagingVolume.emptyDir.sizeLimit }}
          {{- else }}
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes: [ "ReadWriteOnce" ]
                storageClassName: {{ .Values.workerSecurity.stagingVolume.pvc.storageClass | quote }}
                resources:
                  requests:
                    storage: {{ .Values.workerSecurity.stagingVolume.pvc.size }}
          {{- end }}
      containers:
        - name: layoutlm-worker
          image: {{ include "ocr-local.layoutlmWorkerImage" . }}
          imagePullPolicy: {{ .Values.image.layoutlmWorker.pullPolicy | default "IfNotPresent" }}
          command:
            - celery
            - -A
            - coordinator.coordinator
            - worker
            - --loglevel=info
            - --queues={{ .Values.layoutlmWorker.queues | default "ocr_layoutlm" }}
            - --concurrency={{ .Values.layoutlmWorker.concurrency }}
            - --max-tasks-per-child={{ .Values.layoutlmWorker.maxTasksPerChild }}
            - --hostname=layoutlm-worker@%h
          volumeMounts:
            {{- if .Values.layoutlmWorker.gpu.enabled }}
            - name: dshm
              mountPath: /dev/shm
            {{- end }}
            - name: staging-volume
              mountPath: {{ .Values.workerSecurity.stagingVolume.mountPath }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secret
          env:
            - name: WORKER_QUEUES
              value: {{ .Values.layoutlmWorker.queues | default "ocr_layoutlm" | quote }}
            - name: WORKER_CONCURRENCY
              value: {{ .Values.layoutlmWorker.concurrency | quote }}
            - name: WORKER_CAPABILITIES
              value: {{ .Values.layoutlmWorker.capabilities | quote }}
            - name: ENABLE_LAYOUTLM
              value: "true"
            - name: LAYOUTLM_MODEL_PATH
              value: {{ .Values.layoutlmWorker.model.name | quote }}
            - name: HF_HOME
              value: {{ .Values.layoutlmWorker.model.cacheDir | quote }}
            {{- range $key, $val := .Values.layoutlmWorker.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          startupProbe:
            exec:
              command:
                - python
                - -c
                - "import torch; import transformers"
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - coordinator.coordinator
                - inspect
                - ping
                - --timeout=10
            periodSeconds: 60
          resources:
            {{- toYaml .Values.layoutlmWorker.resources | nindent 12 }}
          {{- with .Values.layoutlmWorker.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
