{{/*
Secret holding all sensitive values. Every key MUST be overridden at install
time via --set or a values-secret.yaml file. The defaults below are
placeholders that will NOT work in production.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  labels:
    {{- include "ocr-local.labels" . | nindent 4 }}
type: Opaque
data:
  # ---- Django ----
  DJANGO_SECRET_KEY: {{ required "secrets.djangoSecretKey must be set" .Values.secrets.djangoSecretKey | b64enc | quote }}

  # ---- PostgreSQL ----
  POSTGRES_PASSWORD: {{ required "secrets.postgresPassword must be set" .Values.secrets.postgresPassword | b64enc | quote }}
  {{- $pgPassword := required "secrets.postgresPassword must be set" .Values.secrets.postgresPassword }}
  {{- $pgHost := printf "%s-postgres" .Release.Name }}
  DATABASE_URL: {{ default (printf "postgres://ocr:%s@%s:5432/ocr" $pgPassword $pgHost) .Values.secrets.databaseUrl | b64enc | quote }}

  # ---- RabbitMQ ----
  RABBITMQ_USER: {{ default "ocr" .Values.secrets.rabbitmqUser | b64enc | quote }}
  RABBITMQ_PASSWORD: {{ required "secrets.rabbitmqPassword must be set" .Values.secrets.rabbitmqPassword | b64enc | quote }}
  {{- $rmqUser := default "ocr" .Values.secrets.rabbitmqUser }}
  {{- $rmqPassword := required "secrets.rabbitmqPassword must be set" .Values.secrets.rabbitmqPassword }}
  {{- $rmqHost := printf "%s-rabbitmq" .Release.Name }}
  CELERY_BROKER_URL: {{ default (printf "amqp://%s:%s@%s:5672//" $rmqUser $rmqPassword $rmqHost) .Values.secrets.celeryBrokerUrl | b64enc | quote }}

  # ---- Redis ----
  REDIS_PASSWORD: {{ required "secrets.redisPassword must be set" .Values.secrets.redisPassword | b64enc | quote }}
  {{- $redisPassword := required "secrets.redisPassword must be set" .Values.secrets.redisPassword }}
  {{- $redisHost := printf "%s-redis" .Release.Name }}
  REDIS_URL: {{ default (printf "redis://:%s@%s:6379/0" $redisPassword $redisHost) .Values.secrets.redisUrl | b64enc | quote }}
  CELERY_RESULT_BACKEND: {{ default (printf "redis://:%s@%s:6379/1" $redisPassword $redisHost) .Values.secrets.celeryResultBackend | b64enc | quote }}

  # ---- RabbitMQ Erlang Cookie ----
  # The Erlang cookie MUST remain stable across helm upgrades.  If it changes,
  # RabbitMQ nodes cannot re-join the cluster and quorum queues lose quorum.
  # Priority: explicit value > existing secret > auto-generated random value.
  {{- if .Values.rabbitmq.erlangCookieSecret }}
  RABBITMQ_ERLANG_COOKIE: {{ .Values.rabbitmq.erlangCookieSecret | b64enc | quote }}
  {{- else }}
  {{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-secret" .Release.Name)) -}}
  {{- $erlangCookie := "" -}}
  {{- if and $existingSecret $existingSecret.data (index $existingSecret.data "RABBITMQ_ERLANG_COOKIE") -}}
  {{- $erlangCookie = index $existingSecret.data "RABBITMQ_ERLANG_COOKIE" | b64dec -}}
  {{- else -}}
  {{- $erlangCookie = randAlphaNum 64 -}}
  {{- end -}}
  RABBITMQ_ERLANG_COOKIE: {{ $erlangCookie | b64enc | quote }}
  {{- end }}

  # ---- Flower ----
  {{- if .Values.flower.enabled }}
  FLOWER_PASSWORD: {{ required "secrets.flowerPassword must be set when flower.enabled=true" .Values.secrets.flowerPassword | b64enc | quote }}
  {{- end }}

  # ---- Metrics API ----
  {{- if .Values.secrets.metricsApiKey }}
  METRICS_API_KEY: {{ .Values.secrets.metricsApiKey | b64enc | quote }}
  {{- end }}

  # ---- S3 (only when storage.backend == "s3") ----
  {{- if eq .Values.storage.backend "s3" }}
  S3_ENDPOINT: {{ required "secrets.s3Endpoint is required when storage.backend=s3" .Values.secrets.s3Endpoint | b64enc | quote }}
  S3_BUCKET: {{ required "secrets.s3Bucket is required when storage.backend=s3" .Values.secrets.s3Bucket | b64enc | quote }}
  S3_ACCESS_KEY: {{ required "secrets.s3AccessKey is required when storage.backend=s3" .Values.secrets.s3AccessKey | b64enc | quote }}
  S3_SECRET_KEY: {{ required "secrets.s3SecretKey is required when storage.backend=s3" .Values.secrets.s3SecretKey | b64enc | quote }}
  S3_REGION: {{ default "" .Values.secrets.s3Region | b64enc | quote }}
  {{- end }}
