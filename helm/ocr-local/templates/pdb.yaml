# =============================================================================
# PodDisruptionBudget: GPU Worker
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-gpu-worker-pdb
  labels:
    {{- include "ocr-local.labels" . | nindent 4 }}
    app.kubernetes.io/component: gpu-worker
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "ocr-local.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gpu-worker
---
